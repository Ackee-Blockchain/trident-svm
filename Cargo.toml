[package]
name = "trident-svm"
authors = ["Ackee Blockchain Security <hello@ackee.xyz>"]
version = "0.0.2"
edition = "2021"
repository = "https://github.com/Ackee-Blockchain/trident-svm"
license-file = "./LICENSE"
readme = "./README.md"
description = "Trident SVM implementation by Ackee Blockchain Security"

[dependencies]

# Solana
solana-sdk = "2"
solana-program-runtime = "2"
# solana_rbpf = "0.8"
solana-sbpf = "0.10"

# Programs
solana-system-program = "2"
solana-bpf-loader-program = "2"
solana-vote-program = "2"
solana-stake-program = "2"
solana-config-program = "2"
solana-compute-budget-program = "2"
solana-address-lookup-table-program = "2"
solana-loader-v4-program = "2"

# Solana SVM
solana-svm = "2"
solana-compute-budget = "2"
solana-logger = "2"

# Misc
serde = { version = "1", default-features = false }
bincode = "1.3"


# Syscall stubs
[dependencies.trident-syscall-stubs-v1]
version = "0.0.1"


[dependencies.trident-syscall-stubs-v2]
version = "0.0.1"
